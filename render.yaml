services:
  - type: web
    name: ai-helpdesk-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-helpdesk-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CONFIDENCE_THRESHOLD
        value: "0.85"
      - key: NOTIFY_BACKEND
        value: console

databases:
  - name: ai-helpdesk-db
    plan: free
    region: singapore